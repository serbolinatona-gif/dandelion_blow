<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oh, it's a flower!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="page-title">
      Oh,it's a flower!
    </h1>
    <div class="content">
      <div class="webcam">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas"> </canvas>
      </div>
      <div class="flower-area">
        <img src="assets/dandelion_bg.png" alt="" class="cake-bg" />
        <img src="assets/dandelion_unblow.gif" alt="" class="cake" />
        <img src="assets/magic.gif" alt="" class="match" />
      </div>
      <p class="instructions">
        Use your hands to make the flower white (using a magic wand), then blow it out!
      </p>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="script.js"></script>
  </body>
</html>
